<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polla Mundialista 2026 - ATA</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #293548;
      --border: #334155;
      --accent: #f59e0b;
      --accent2: #10b981;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --gold: #fbbf24;
      --silver: #94a3b8;
      --bronze: #cd7c2f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%); padding: 2rem 1rem; text-align: center; border-bottom: 3px solid var(--accent); }
    .header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.25rem; }
    .header .subtitle { color: #c7d2fe; font-size: 0.95rem; }
    .phase-badge { display: inline-block; margin-top: 0.75rem; background: var(--accent); color: #000; font-weight: 700; font-size: 0.85rem; padding: 0.35rem 1rem; border-radius: 99px; }
  </style>
</head>
<body>
<p>placeholder</p>
</body>
</html>
